<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | AgriNova</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">AgriNova</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="innovations.html">Innovations</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contact Section -->
  <div class="container my-5">
    <div class="row">
      <!-- Contact Form -->
      <div class="col-md-8">
        <h2>Get in Touch</h2>
        <form id="contactForm">
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" placeholder="Your Name" required>
          </div>
          <div class="mb-3">
            <label for="phone" class="form-label">Phone</label>
            <input type="tel" class="form-control" id="phone" placeholder="+251 911 234 567" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label for="subject" class="form-label">Subject</label>
            <input type="text" class="form-control" id="subject" placeholder="Subject" required>
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" id="message" rows="5" placeholder="Your message..." required></textarea>
          </div>
          <button type="submit" class="btn btn-success">Send Message</button>
          <div id="formAlert" class="alert alert-success mt-3 d-none" role="alert">
            Message sent successfully!
          </div>
        </form>
      </div>

      <!-- Contact Info Card -->
      <div class="col-md-4">
        <div class="card p-3 bg-light shadow-sm">
          <h5>Contact Information</h5>
          <p><i class="bi bi-telephone-fill text-success"></i> <strong>Phone:</strong> 011 1 234576</p>
          <p><i class="bi bi-envelope-fill text-success"></i> <strong>Email:</strong> Smart@agrinova.com</p>
          <p><i class="bi bi-geo-alt-fill text-success"></i> <strong>Address:</strong> AgriNova HQ, CMC, Addis Ababa, Ethiopia</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Google Map -->
  <div class="container mb-5">
    <h3 class="text-center mb-3">AgriNova HQ – CMC, Addis Ababa</h3>
    <div class="map-container ratio ratio-16x9">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3944.145053743441!2d38.79454887478286!3d9.02449269099837!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x164b85a5e1b5d3a5%3A0x7f3b9c3d7f4b6c3e!2sCMC%2C%20Addis%20Ababa!5e0!3m2!1sen!2set!4v1700000000000"
        allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-success text-white text-center py-3">
    <p>&copy; 2025 AgriNova | Follow us on 
      <i class="bi bi-facebook"></i> 
      <i class="bi bi-twitter"></i> 
      <i class="bi bi-instagram"></i>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();
      document.getElementById("formAlert").classList.remove("d-none");
      this.reset();
    });
  </script>
</body>
</html>
